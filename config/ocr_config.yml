# OCR引擎配置
# 支持的引擎: 'tesseract' (本地), 'aliyun' (阿里云), 'baidu' (百度), 'demo' (演示)

development:
  engine: 'demo'
  engines:
    tesseract:
      enabled: true
      lang: 'chi_sim+eng'
      psm: 1
    aliyun:
      enabled: false
      access_key_id: 'your_access_key_id'
      access_key_secret: 'your_access_key_secret'
      endpoint: 'https://ocr.cn-shanghai.aliyuncs.com'
    baidu:
      enabled: false
      api_key: 'your_api_key'
      secret_key: 'your_secret_key'
      endpoint: 'https://aip.baidubce.com'
    demo:
      enabled: true

test:
  engine: 'demo'
  engines:
    tesseract:
      enabled: true
      lang: 'eng'
      psm: 1
    demo:
      enabled: true

production:
  engine: 'demo'
  engines:
    tesseract:
      enabled: true
      lang: 'chi_sim+eng'
      psm: 1
    aliyun:
      enabled: false
      access_key_id: <%= ENV['ALIYUN_ACCESS_KEY_ID'] %>
      access_key_secret: <%= ENV['ALIYUN_ACCESS_KEY_SECRET'] %>
      endpoint: 'https://ocr.cn-shanghai.aliyuncs.com'
    baidu:
      enabled: false
      api_key: <%= ENV['BAIDU_API_KEY'] %>
      secret_key: <%= ENV['BAIDU_SECRET_KEY'] %>
      endpoint: 'https://aip.baidubce.com'
    demo:
      enabled: true
