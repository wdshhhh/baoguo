<!DOCTYPE html>
<html>
<head>
  <title>Test Vue</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="app">{{ message }}</div>
  <script>
    const { createApp } = Vue
    createApp({
      data() {
        return {
          message: 'Hello Vue!'
        }
      }
    }).mount('#app')
    console.log('Vue mounted successfully')
  </script>
</body>
</html>
