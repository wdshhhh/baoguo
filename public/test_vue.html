<!DOCTYPE html>
<html>
<head>
  <title>Test Vue App</title>
  <script type="module">
    import { createApp } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    
    createApp({
      template: '<div style="text-align:center;margin-top:50px;"><h1>Hello Vue!</h1><p>Vue is working!</p></div>'
    }).mount('#app')
    console.log('Vue mounted successfully!')
  </script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
